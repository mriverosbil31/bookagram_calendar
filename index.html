<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Husband's Corner — Content Calendar</title>
  <meta name="description" content="12-month Bookstagram & BookTok content calendar for thriller, mystery and suspense books. The Husband's Corner posting plan.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">The Husband's <span>Corner</span></div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#6B3FA0;"></div>Instagram</div>
        <div class="leg"><div class="leg-dot" style="background:#8b1a1a;"></div>TikTok</div>
        <div class="leg"><div class="leg-dot" style="background:#1a5c4a;"></div>Both</div>
        <div class="leg"><div class="leg-dot" style="background:#7a5500;"></div>Story</div>
      </div>
    </div>
  </header>

  <div class="hero-band">
    <h1>Your <em>Thriller, Mystery &amp; Suspense</em><br>Content Calendar</h1>
    <p class="hero-sub">The Husband's Corner — Bookstagram &amp; BookTok · 12-month plan</p>
    <div class="social-handles">
      <a class="social-handle" href="https://www.instagram.com/thehusbandscorner" target="_blank" rel="noopener">
        <span class="sh-dot" style="background:#6B3FA0;"></span>@thehusbandscorner
      </a>
      <a class="social-handle" href="https://www.tiktok.com/@thehusbandscorner" target="_blank" rel="noopener">
        <span class="sh-dot" style="background:#8b1a1a;"></span>@thehusbandscorner
      </a>
    </div>
  </div>

  <nav class="view-nav-wrap" aria-label="View navigation">
    <div class="view-nav">
      <button class="vnav active" id="vnav-calendar" onclick="setView('calendar')">Calendar</button>
      <button class="vnav" id="vnav-books" onclick="setView('books')">Books</button>
      <button class="vnav" id="vnav-resources" onclick="setView('resources')">Reading Lists</button>
    </div>
  </nav>

  <nav class="month-nav-wrap" id="month-nav-wrap" aria-label="Month navigation">
    <div class="month-nav" id="month-nav"></div>
  </nav>

  <main class="main" id="main-content" aria-live="polite"></main>

  <footer class="site-footer">
    <p>"There is nothing more deceptive than an obvious fact." — Arthur Conan Doyle</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
